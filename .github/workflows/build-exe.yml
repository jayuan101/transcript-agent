name: Build & Publish Desktop App

on:
  push:
    branches: [main]
    tags: ['v*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.2.3) — leave blank to read from app.py'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install numpy pandas
          pip install gradio anthropic openai groq
          pip install pdfplumber fpdf2 python-docx
          pip install "deepgram-sdk>=3.2.0,<4.0.0" assemblyai elevenlabs rev_ai
          pip install fastapi uvicorn[standard] python-multipart aiofiles httpx orjson
          pip install requests packaging typing_extensions
          pip install opencv-python-headless mediapipe
          pip install imageio-ffmpeg

      - name: Generate app icon
        run: |
          pip install pillow
          python create_icon.py --windows

      - name: Build with PyInstaller
        run: pyinstaller TranscriptAgent.spec

      - name: Zip the onedir bundle
        run: |
          cd dist
          Compress-Archive -Path TranscriptAgent -DestinationPath TranscriptAgent-win64.zip -Force
          cd ..

      - name: Get app version
        id: appver
        shell: pwsh
        run: |
          $v = (Select-String -Path app.py -Pattern '^APP_VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          echo "ver=$v" >> $env:GITHUB_OUTPUT

      - name: Create installer and OTA launcher
        shell: pwsh
        run: |
          $ver = "${{ steps.appver.outputs.ver }}"

          # ── ta_launcher.ps1 ── runs silently on every launch ─────────────────
          # Checks GitHub, downloads update if available, then starts the app.
          # Shows a toast-style popup ONLY when an update is downloading so the
          # user knows why launch is delayed.
          $lines = @(
            'Add-Type -AssemblyName System.Windows.Forms',
            '$installDir = [System.IO.Path]::Combine($env:LOCALAPPDATA, "TranscriptAgent")',
            '$exePath    = [System.IO.Path]::Combine($installDir, "TranscriptAgent", "TranscriptAgent.exe")',
            '$verFile    = [System.IO.Path]::Combine($installDir, "version.txt")',
            '$currentVer = if (Test-Path $verFile) { [System.IO.File]::ReadAllText($verFile).Trim() } else { "0.0.0" }',
            'function Show-Toast($msg) {',
            '    $n = New-Object System.Windows.Forms.NotifyIcon',
            '    $n.Icon = [System.Drawing.Icon]::ExtractAssociatedIcon($exePath)',
            '    $n.Visible = $true',
            '    $n.ShowBalloonTip(4000, "Transcript Agent", $msg, [System.Windows.Forms.ToolTipIcon]::Info)',
            '    Start-Sleep -Seconds 1',
            '    $n.Dispose()',
            '}',
            'try {',
            '    $rel    = Invoke-RestMethod "https://api.github.com/repos/jayuan101/transcript-agent/releases/latest" -TimeoutSec 8 -UseBasicParsing',
            '    $latest = $rel.tag_name.TrimStart("v")',
            '    $asset  = $rel.assets | Where-Object { $_.name -eq "TranscriptAgent-win64.zip" } | Select-Object -First 1',
            '    if ($asset -and $latest -ne $currentVer) {',
            '        Show-Toast "Updating to v$latest — please wait a moment..."',
            '        $zip = [System.IO.Path]::Combine($env:TEMP, "ta_update.zip")',
            '        Invoke-WebRequest $asset.browser_download_url -OutFile $zip -UseBasicParsing',
            '        Expand-Archive -Path $zip -DestinationPath $installDir -Force',
            '        [System.IO.File]::WriteAllText($verFile, $latest)',
            '        Remove-Item $zip -Force -ErrorAction SilentlyContinue',
            '        Show-Toast "Updated to v$latest — launching now!"',
            '    }',
            '} catch { <# No internet or GitHub down — launch anyway #> }',
            'if (Test-Path $exePath) {',
            '    Start-Process -FilePath $exePath -WorkingDirectory (Split-Path $exePath)',
            '} else {',
            '    [System.Windows.Forms.MessageBox]::Show("Transcript Agent not found at:`n$exePath`n`nPlease reinstall.", "Launch Error", 0, 16)',
            '}'
          )
          $lines | Out-File -FilePath dist\ta_launcher.ps1 -Encoding UTF8

          # ── Launch-TranscriptAgent.bat ─────────────────────────────────────────
          $bat = @(
            '@echo off',
            'powershell -NoProfile -ExecutionPolicy Bypass -NonInteractive -WindowStyle Hidden -File "%LOCALAPPDATA%\TranscriptAgent\ta_launcher.ps1"'
          )
          $bat | Out-File -FilePath dist\Launch-TranscriptAgent.bat -Encoding ASCII

          # ── Install-TranscriptAgent.bat ────────────────────────────────────────
          $inst = @(
            '@echo off',
            'setlocal enabledelayedexpansion',
            'title Transcript Agent Installer',
            'echo.',
            'echo  ============================================',
            'echo   Transcript Agent Installer',
            'echo  ============================================',
            'echo.',
            ':: Check 64-bit Windows (required)',
            'if not exist "%SystemRoot%\SysWOW64" (',
            '  echo  ERROR: Transcript Agent requires 64-bit Windows 10 or later.',
            '  echo  Your system appears to be 32-bit which is not supported.',
            '  pause & exit /b 1',
            ')',
            ':: Check Windows 10+ (build 17763+)',
            'for /f "tokens=4-5 delims=. " %%i in (''ver'') do set WIN_VER=%%i',
            'if !WIN_VER! LSS 10 (',
            '  echo  ERROR: Windows 10 or later is required.',
            '  pause & exit /b 1',
            ')',
            ':: OneDrive check',
            'echo %~dp0| findstr /i "OneDrive" >nul 2>&1',
            'if not errorlevel 1 (',
            '  echo  WARNING: OneDrive folder detected.',
            '  echo  Please move this folder to C:\TranscriptAgent\ and try again.',
            '  pause & exit /b 1',
            ')',
            'set "INSTALL_DIR=%LOCALAPPDATA%\TranscriptAgent"',
            'echo  Installing to: %INSTALL_DIR%',
            'echo.',
            'if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"',
            ':: Extract app',
            'echo  Extracting files...',
            'powershell -NoProfile -ExecutionPolicy Bypass -Command "Expand-Archive -Path ''%~dp0TranscriptAgent-win64.zip'' -DestinationPath ''%INSTALL_DIR%'' -Force"',
            'if errorlevel 1 (',
            '  echo  ERROR: Extraction failed. Make sure TranscriptAgent-win64.zip is in the same folder as this installer.',
            '  pause & exit /b 1',
            ')',
            ':: Copy OTA launcher files',
            'copy /Y "%~dp0ta_launcher.ps1" "%INSTALL_DIR%\ta_launcher.ps1" >nul 2>&1',
            'copy /Y "%~dp0Launch-TranscriptAgent.bat" "%INSTALL_DIR%\Launch-TranscriptAgent.bat" >nul 2>&1',
            ":: Write version",
            "echo $ver> `"%INSTALL_DIR%\version.txt`"",
            ':: Desktop shortcut',
            'echo  Creating Desktop shortcut...',
            'powershell -NoProfile -ExecutionPolicy Bypass -Command "$ws=New-Object -ComObject WScript.Shell; $s=$ws.CreateShortcut([Environment]::GetFolderPath(''Desktop'')+''\Transcript Agent.lnk''); $s.TargetPath=''%INSTALL_DIR%\Launch-TranscriptAgent.bat''; $s.WorkingDirectory=''%INSTALL_DIR%''; $s.IconLocation=''%INSTALL_DIR%\TranscriptAgent\TranscriptAgent.exe,0''; $s.WindowStyle=1; $s.Description=''Transcript Agent — AI transcription and interview analysis''; $s.Save()"',
            'echo.',
            'echo  ============================================',
            'echo   Installation complete!',
            'echo   Double-click "Transcript Agent" on your',
            'echo   Desktop to launch. Updates are automatic.',
            'echo  ============================================',
            'echo.',
            'echo  Launching Transcript Agent now...',
            'start "" "%INSTALL_DIR%\Launch-TranscriptAgent.bat"',
            'exit /b 0'
          )
          $inst | Out-File -FilePath dist\Install-TranscriptAgent.bat -Encoding utf8

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/TranscriptAgent-win64.zip
            dist/TranscriptAgent/TranscriptAgent.exe
            dist/Install-TranscriptAgent.bat
            dist/ta_launcher.ps1
            dist/Launch-TranscriptAgent.bat

  # ── Mac .dmg ────────────────────────────────────────────────────────────────
  build-mac:
    name: Build Mac .dmg
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install numpy pandas
          pip install gradio anthropic openai groq
          pip install pdfplumber fpdf2 python-docx
          pip install "deepgram-sdk>=3.2.0,<4.0.0" assemblyai elevenlabs rev_ai
          pip install fastapi "uvicorn[standard]" python-multipart aiofiles httpx orjson
          pip install requests packaging typing_extensions
          pip install opencv-python-headless mediapipe
          pip install imageio-ffmpeg

      - name: Generate app icon
        run: |
          pip install pillow
          python create_icon.py --mac

      - name: Build with PyInstaller
        run: pyinstaller TranscriptAgent.spec

      - name: Create .dmg
        run: |
          brew install create-dmg || true
          mkdir -p dist/dmg_staging
          cp -r dist/TranscriptAgent.app dist/dmg_staging/
          create-dmg \
            --volname "Transcript Agent" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TranscriptAgent.app" 175 190 \
            --hide-extension "TranscriptAgent.app" \
            --app-drop-link 425 190 \
            "dist/TranscriptAgent.dmg" \
            "dist/dmg_staging/" \
          || hdiutil create -volname "TranscriptAgent" \
               -srcfolder dist/TranscriptAgent.app \
               -ov -format UDZO dist/TranscriptAgent.dmg

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/TranscriptAgent.dmg

  # ── Publish to GitHub Releases ───────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: Get version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VER=$(grep -m1 '^APP_VERSION' app.py | sed 's/.*"\([^"]*\)".*/\1/')
            echo "tag=v${VER}" >> $GITHUB_OUTPUT
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Transcript Agent ${{ steps.version.outputs.tag }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Transcript Agent ${{ steps.version.outputs.tag }}

            **Interview Mode** · **9 STT Engines** · **History** · **SRT/VTT/DOCX exports**

            ---

            ### 🪟 Windows — Install
            1. Download **both** `TranscriptAgent-win64.zip` and `Install-TranscriptAgent.bat` into the **same folder**
            2. Double-click `Install-TranscriptAgent.bat`
            3. It extracts, creates a **Desktop shortcut**, and launches automatically

            **To launch after install:**
            - Double-click **Transcript Agent** on your Desktop ← easiest
            - Or navigate to `%LOCALAPPDATA%\TranscriptAgent\TranscriptAgent\` and run `TranscriptAgent.exe`

            > ⚠️ Do NOT run `TranscriptAgent.exe` directly from inside the zip — always use the installer first.

            ---

            ### 🍎 Mac — Install
            1. Download `TranscriptAgent.dmg`
            2. Open it → drag **Transcript Agent** to Applications
            3. Double-click to launch

            **To launch after install:**
            - Open **Applications** → double-click **Transcript Agent**

            ---

            ### First run
            The app opens your browser at `http://localhost:7860` automatically.
            Enter your API key and start transcribing.

            > Full changelog: [CHANGELOG.md](https://github.com/jayuan101/transcript-agent/blob/main/CHANGELOG.md)
          files: |
            artifacts/windows/TranscriptAgent-win64.zip
            artifacts/windows/TranscriptAgent/TranscriptAgent.exe
            artifacts/windows/Install-TranscriptAgent.bat
            artifacts/windows/ta_launcher.ps1
            artifacts/windows/Launch-TranscriptAgent.bat
            artifacts/mac/TranscriptAgent.dmg
          draft: false
          prerelease: false
          overwrite_files: true
