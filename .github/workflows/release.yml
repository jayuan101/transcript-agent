name: Auto-Publish Release

on:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build distribution packages
        run: |
          python build_win_zip.py
          python build_mac_zip.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Transcript Agent ${{ github.ref_name }}"
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### 🪟 Windows
            1. Download **TranscriptAgent-Windows.zip**
            2. Extract the zip
            3. Double-click **setup_windows.bat** — installs Python packages + creates Desktop shortcut
            4. Double-click **run.bat** every time after

            ### 🍎 Mac
            1. Download **TranscriptAgent-Mac.zip**
            2. Extract the zip
            3. Open Terminal in the folder and run: **bash setup_mac.sh**
            4. Double-click **Transcript Agent** on your Desktop every time after

            > First-time install downloads ~2–3 GB (Python packages + Whisper model).
            > Your API keys are stored locally only — never sent to any server.
          files: |
            dist/TranscriptAgent-Windows.zip
            dist/TranscriptAgent-Mac.zip
          draft: false
          prerelease: false
