# ── Transcript Agent — Local Build ────────────────────────────────────────────
# Build from source, then run:
#   docker compose build
#   docker compose up -d
#
# To pull a pre-built image instead (no git clone needed):
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  transcript-agent:
    build:
      context: .
      args:
        VERSION: "2.5.13"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_SHA: "${GIT_SHA:-unknown}"
    image: transcript-agent:2.5.13
    container_name: transcript-agent
    ports:
      - "7860:7860"          # Gradio UI  — http://localhost:7860
      - "8000:8000"          # REST API   — http://localhost:8000/docs
    volumes:
      - ./.env:/app/.env:ro              # API keys — read-only inside container
      - ./outputs:/app/outputs           # Transcript outputs saved here on your host
      - whisper-cache:/app/.cache        # Whisper model cache — survives restarts
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - TZ=${TZ:-America/New_York}
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - GRADIO_ANALYTICS_ENABLED=False
    # ── GPU support (NVIDIA) ──────────────────────────────────────────────────
    # Linux:   sudo apt install nvidia-container-toolkit && sudo systemctl restart docker
    # Windows: WSL2 + NVIDIA driver ≥ 510 + Docker Desktop ≥ 4.13
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper-cache:
    name: transcript-agent-whisper-cache
