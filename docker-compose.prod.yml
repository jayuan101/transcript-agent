# ── Transcript Agent — Pull from Docker Hub (no build needed) ─────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Pinned tag:  sushi0934/transcript-agent:2.5.13
# Latest tag:  sushi0934/transcript-agent:latest  (auto-updates)
# ─────────────────────────────────────────────────────────────────────────────

services:
  transcript-agent:
    image: ${DOCKERHUB_USERNAME:-sushi0934}/transcript-agent:latest
    pull_policy: always          # re-pull on every `docker compose up` to stay current
    container_name: transcript-agent
    ports:
      - "7860:7860"
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./outputs:/app/outputs
      - whisper-cache:/app/.cache
    env_file:
      - .env
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - TZ=${TZ:-America/New_York}
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    # ── GPU support (NVIDIA) ──────────────────────────────────────────────────
    # Uncomment if you have an NVIDIA GPU + nvidia-container-toolkit installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: uncomment to auto-update the image every hour without touching the compose file
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 3600 --cleanup transcript-agent
  #   restart: unless-stopped

volumes:
  whisper-cache:
    name: transcript-agent-whisper-cache
