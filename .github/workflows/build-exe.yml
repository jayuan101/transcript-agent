name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install whisperx pyinstaller

      - name: Download ffmpeg
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_bin
          $ffmpeg = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_bin | Select-Object -First 1
          Copy-Item $ffmpeg.FullName ffmpeg.exe

      - name: Build Windows .exe
        run: |
          pyinstaller launcher.py `
            --name "TranscriptAgent" `
            --onefile `
            --windowed `
            --add-data "app.py;." `
            --add-data "transcript_agent.py;." `
            --add-data "api.py;." `
            --add-binary "ffmpeg.exe;." `
            --hidden-import "gradio" `
            --hidden-import "gradio.themes" `
            --hidden-import "whisperx" `
            --hidden-import "anthropic" `
            --hidden-import "openai" `
            --hidden-import "docx" `
            --hidden-import "fpdf" `
            --hidden-import "pdfplumber" `
            --hidden-import "uvicorn" `
            --hidden-import "fastapi" `
            --collect-all "gradio" `
            --collect-all "gradio_client" `
            --collect-all "whisperx" `
            --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TranscriptAgent.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install whisperx pyinstaller

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build macOS app
        run: |
          pyinstaller launcher.py \
            --name "TranscriptAgent" \
            --onefile \
            --windowed \
            --add-data "app.py:." \
            --add-data "transcript_agent.py:." \
            --add-data "api.py:." \
            --hidden-import "gradio" \
            --hidden-import "gradio.themes" \
            --hidden-import "whisperx" \
            --hidden-import "anthropic" \
            --hidden-import "openai" \
            --hidden-import "docx" \
            --hidden-import "fpdf" \
            --hidden-import "pdfplumber" \
            --hidden-import "uvicorn" \
            --hidden-import "fastapi" \
            --collect-all "gradio" \
            --collect-all "gradio_client" \
            --collect-all "whisperx" \
            --noconfirm

      - name: Zip macOS app
        run: |
          cd dist
          zip -r TranscriptAgent-mac.zip TranscriptAgent.app 2>/dev/null || zip -r TranscriptAgent-mac.zip TranscriptAgent

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/TranscriptAgent-mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install whisperx pyinstaller

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Build Linux binary
        run: |
          pyinstaller launcher.py \
            --name "TranscriptAgent" \
            --onefile \
            --add-data "app.py:." \
            --add-data "transcript_agent.py:." \
            --add-data "api.py:." \
            --hidden-import "gradio" \
            --hidden-import "gradio.themes" \
            --hidden-import "whisperx" \
            --hidden-import "anthropic" \
            --hidden-import "openai" \
            --hidden-import "docx" \
            --hidden-import "fpdf" \
            --hidden-import "pdfplumber" \
            --hidden-import "uvicorn" \
            --hidden-import "fastapi" \
            --collect-all "gradio" \
            --collect-all "gradio_client" \
            --collect-all "whisperx" \
            --noconfirm

      - name: Package Linux binary
        run: |
          cd dist
          tar -czf TranscriptAgent-linux.tar.gz TranscriptAgent

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: dist/TranscriptAgent-linux.tar.gz

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-app
          path: artifacts/mac

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: artifacts/linux

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            artifacts/windows/TranscriptAgent.exe \
            artifacts/mac/TranscriptAgent-mac.zip \
            artifacts/linux/TranscriptAgent-linux.tar.gz \
            --repo jayuan101/transcript-agent-releases \
            --title "Transcript Agent $TAG" \
            --notes "$(cat <<'EOF'
          ## Download

          | Platform | File | How to run |
          |----------|------|------------|
          | Windows  | TranscriptAgent.exe | Double-click to run |
          | macOS    | TranscriptAgent-mac.zip | Unzip, then open TranscriptAgent |
          | Linux    | TranscriptAgent-linux.tar.gz | Extract, then run: chmod +x TranscriptAgent && ./TranscriptAgent |

          No installation needed on any platform.
          EOF
          )" \
            --latest
