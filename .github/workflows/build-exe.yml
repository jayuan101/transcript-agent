name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\go" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\node" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Ruby" -ErrorAction SilentlyContinue
          Write-Host "Disk free after cleanup:"
          Get-PSDrive C | Select-Object Used, Free

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}

      - name: Install CPU-only PyTorch (avoids 3GB CUDA downloads)
        run: |
          pip install --no-cache-dir `
            torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0 `
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir whisperx pyinstaller pywebview

      - name: Download ffmpeg
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_bin
          $ffmpeg = Get-ChildItem -Recurse -Filter "ffmpeg.exe" ffmpeg_bin | Select-Object -First 1
          Copy-Item $ffmpeg.FullName ffmpeg.exe

      - name: Build Windows .exe
        run: |
          pyinstaller launcher.py `
            --name "TranscriptAgent" `
            --onefile `
            --windowed `
            --add-data "app.py;." `
            --add-data "transcript_agent.py;." `
            --add-data "api.py;." `
            --add-binary "ffmpeg.exe;." `
            --hidden-import "gradio" `
            --hidden-import "gradio.themes" `
            --hidden-import "whisperx" `
            --hidden-import "anthropic" `
            --hidden-import "openai" `
            --hidden-import "docx" `
            --hidden-import "fpdf" `
            --hidden-import "pdfplumber" `
            --hidden-import "uvicorn" `
            --hidden-import "fastapi" `
            --hidden-import "webview" `
            --collect-all "gradio" `
            --collect-all "gradio_client" `
            --collect-all "whisperx" `
            --collect-all "webview" `
            --collect-data "safehttpx" `
            --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TranscriptAgent.exe

  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData || true
          sudo rm -rf /Applications/Xcode.app || true
          brew cleanup --prune=all || true
          df -h /

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('requirements.txt') }}

      - name: Install CPU-only PyTorch (avoids 3GB CUDA downloads)
        run: |
          pip install --no-cache-dir \
            torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir whisperx pyinstaller pywebview

      - name: Install ffmpeg and create-dmg
        run: brew install ffmpeg create-dmg

      - name: Build macOS .app
        run: |
          pyinstaller launcher.py \
            --name "TranscriptAgent" \
            --onefile \
            --windowed \
            --add-data "app.py:." \
            --add-data "transcript_agent.py:." \
            --add-data "api.py:." \
            --hidden-import "gradio" \
            --hidden-import "gradio.themes" \
            --hidden-import "whisperx" \
            --hidden-import "anthropic" \
            --hidden-import "openai" \
            --hidden-import "docx" \
            --hidden-import "fpdf" \
            --hidden-import "pdfplumber" \
            --hidden-import "uvicorn" \
            --hidden-import "fastapi" \
            --hidden-import "webview" \
            --collect-all "gradio" \
            --collect-all "gradio_client" \
            --collect-all "whisperx" \
            --collect-all "webview" \
            --collect-data "safehttpx" \
            --noconfirm

      - name: Create macOS DMG
        run: |
          APP="dist/TranscriptAgent.app"
          if [ ! -d "$APP" ]; then
            mkdir -p "$APP/Contents/MacOS"
            cp dist/TranscriptAgent "$APP/Contents/MacOS/TranscriptAgent"
            cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>TranscriptAgent</string>
            <key>CFBundleExecutable</key><string>TranscriptAgent</string>
            <key>CFBundleIdentifier</key><string>com.jayuan101.transcriptagent</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict></plist>
          PLIST
          fi
          create-dmg \
            --volname "Transcript Agent" \
            --volicon "$APP/Contents/Resources/icon-windowed.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 120 \
            --icon "TranscriptAgent.app" 150 185 \
            --hide-extension "TranscriptAgent.app" \
            --app-drop-link 450 185 \
            "TranscriptAgent.dmg" \
            "$APP" 2>/dev/null || \
          create-dmg \
            --volname "Transcript Agent" \
            --window-size 600 400 \
            --icon-size 120 \
            --app-drop-link 450 185 \
            "TranscriptAgent.dmg" \
            "$APP"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: TranscriptAgent.dmg

  build-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install CPU-only PyTorch (avoids 3GB CUDA downloads)
        run: |
          pip install --no-cache-dir \
            torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir whisperx pyinstaller pywebview

      - name: Build Linux binary
        run: |
          pyinstaller launcher.py \
            --name "TranscriptAgent" \
            --onefile \
            --add-data "app.py:." \
            --add-data "transcript_agent.py:." \
            --add-data "api.py:." \
            --hidden-import "gradio" \
            --hidden-import "gradio.themes" \
            --hidden-import "whisperx" \
            --hidden-import "anthropic" \
            --hidden-import "openai" \
            --hidden-import "docx" \
            --hidden-import "fpdf" \
            --hidden-import "pdfplumber" \
            --hidden-import "uvicorn" \
            --hidden-import "fastapi" \
            --hidden-import "webview" \
            --collect-all "gradio" \
            --collect-all "gradio_client" \
            --collect-all "whisperx" \
            --collect-all "webview" \
            --collect-data "safehttpx" \
            --noconfirm

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/TranscriptAgent AppDir/usr/bin/TranscriptAgent
          chmod +x AppDir/usr/bin/TranscriptAgent

          cat > AppDir/usr/share/applications/transcript-agent.desktop << 'EOF'
          [Desktop Entry]
          Name=Transcript Agent
          Comment=AI-powered transcription for interviews and meetings
          Exec=TranscriptAgent
          Icon=transcript-agent
          Type=Application
          Categories=Utility;AudioVideo;
          EOF

          cp AppDir/usr/share/applications/transcript-agent.desktop AppDir/transcript-agent.desktop
          ln -s usr/bin/TranscriptAgent AppDir/AppRun
          touch AppDir/usr/share/icons/hicolor/256x256/apps/transcript-agent.png

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir TranscriptAgent-linux.AppImage 2>&1 || true

          if [ ! -f TranscriptAgent-linux.AppImage ]; then
            tar -czf TranscriptAgent-linux.tar.gz -C dist TranscriptAgent
          fi

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: |
            TranscriptAgent-linux.AppImage
            TranscriptAgent-linux.tar.gz

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          FILES=""
          [ -f artifacts/windows-exe/TranscriptAgent.exe ] && FILES="$FILES artifacts/windows-exe/TranscriptAgent.exe"
          [ -f artifacts/mac-dmg/TranscriptAgent.dmg ]     && FILES="$FILES artifacts/mac-dmg/TranscriptAgent.dmg"
          [ -f artifacts/linux-app/TranscriptAgent-linux.AppImage ] && FILES="$FILES artifacts/linux-app/TranscriptAgent-linux.AppImage"
          [ -f artifacts/linux-app/TranscriptAgent-linux.tar.gz ]   && FILES="$FILES artifacts/linux-app/TranscriptAgent-linux.tar.gz"

          gh release create "$TAG" $FILES \
            --repo jayuan101/transcript-agent-releases \
            --title "Transcript Agent $TAG" \
            --notes "$(cat <<'EOF'
          ## Download

          | Platform | File | How to install |
          |----------|------|----------------|
          | Windows 10/11 | TranscriptAgent.exe | Double-click to run |
          | macOS | TranscriptAgent.dmg | Open DMG → drag to Applications → double-click |
          | Linux | TranscriptAgent-linux.AppImage | chmod +x, then double-click or run directly |

          All versions open as a standalone desktop app — no browser, no installation required.
          EOF
          )" \
            --latest
